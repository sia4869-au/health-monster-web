<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7fe3d6"/>
      <stop offset="1" stop-color="#ffd1a6"/>
    </linearGradient>
    <filter id="s" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- transparent background -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- subtle ground shadow -->
  <ellipse cx="512" cy="760" rx="220" ry="48" fill="#000" opacity="0.12" />

  <!-- body -->
  <g transform="translate(0, -20)">
    <ellipse cx="512" cy="460" rx="220" ry="220" fill="url(#g1)" filter="url(#s)"/>
    <!-- cheeks -->
    <ellipse cx="440" cy="500" rx="28" ry="18" fill="#ffb6b6" opacity="0.9"/>
    <ellipse cx="584" cy="500" rx="28" ry="18" fill="#ffb6b6" opacity="0.9"/>
    <!-- eyes -->
    <g>
      <ellipse cx="470" cy="430" rx="36" ry="46" fill="#0b2540"/>
      <circle cx="462" cy="418" r="10" fill="#fff" opacity="0.95"/>
      <ellipse cx="554" cy="430" rx="36" ry="46" fill="#0b2540"/>
      <circle cx="546" cy="418" r="10" fill="#fff" opacity="0.95"/>
    </g>
    <!-- mouth -->
    <path d="M470 500 Q512 540 554 500" stroke="#7a2b2b" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- small leaf accessory -->
    <g transform="translate(620,320) rotate(-20)">
      <path d="M0 0 C20 -10, 40 -10, 60 0 C40 10, 20 10, 0 0 Z" fill="#6bbf59"/>
      <path d="M30 -6 L30 8" stroke="#3b6b2a" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- stubby limbs -->
    <ellipse cx="360" cy="620" rx="36" ry="22" fill="#7fe3d6" opacity="0.95"/>
    <ellipse cx="664" cy="620" rx="36" ry="22" fill="#7fe3d6" opacity="0.95"/>
    <!-- tiny tail -->
    <path d="M320 520 q-40 20 -60 10 q30 -10 60 -30" fill="#6fd6c6" opacity="0.95"/>
    <!-- subtle markings -->
    <path d="M480 380 q20 -10 40 0" stroke="#ffffff" stroke-opacity="0.25" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
